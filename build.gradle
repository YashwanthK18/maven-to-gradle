plugins {
    id 'java'
    id 'application'
}

group = 'com.example1'
version = '1.0-SNAPSHOT'

description = 'm2g'

java {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

application {
    mainClass = 'com.example1.Main'
}
