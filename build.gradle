plugins {
    id 'java'
    id 'application'
}

group = 'com.example1'
version = '1.0-SNAPSHOT'

description = 'm2g'

sourceCompatibility = 11
targetCompatibility = 11

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
}

application {
    mainClassName = 'com.example1.Main'
}
